site:
  font: "./renderer/assets/font.woff2"

  profile:
    title: "Yumeka の 主页"
    avatar: "./assets/avatar.jpg"
    aliases:
      - label: "@KlxPiao"
        tooltip: "不重复的平台ID: KlxPiao"
        copy: "KlxPiao"
      - label: "/ miniyu157"
        tooltip: "远古的ID: miniyu157"
        copy: "miniyu157"
      - label: "/ YMKxxxxxxxx"
        tooltip: "X(Twitter)的ID: YMKxxxxxxxx"
        copy: "YMKxxxxxxxx"

  about:
    heading: "关于我"
    traits:
      - icon: "fa-solid fa-user"
        tooltip: "86% 内向"
      - icon: "fa-solid fa-brain"
        tooltip: "69% 天马行空"
      - icon: "fa-solid fa-heart"
        tooltip: "82% 情感细腻"
      - icon: "fa-solid fa-dice"
        tooltip: "63% 随机应变"
      - icon: "fa-solid fa-star"
        tooltip: "83% 自信果断"
    bio: "你好～ 这里是 Yumeka，也可以叫我<span class='font-semibold text-purple-400'>梦花</span>，是一个热爱编程与 ACG 的普通大学生。向往纯粹的浪漫与唯美，<span class='font-semibold text-pink-400'>喜欢和善良的人交朋友。</span>"
    tags:
      - text: "ArchLinux"
        copy: "ArchLinux"
      - text: "i7-9750HF"
        copy: "i7-9750HF"
      - text: "GTX 1650"
        copy: "GTX 1650"
      - text: "INFP-A"
        copy: "INFP-A"
      - text: "🎂 12-08"
        copy: "12-08"

  portals:
    heading: "传送门"
    items:
      - title: "Yumeka 的小窝"
        desc: "似乎什么都没有, 会分享些什么呢?"
        url: "https://sudo.yumeka.blog/"
        icon: "fa-solid fa-house-chimney"
      - title: "LGBTQIA+ 骄傲旗帜"
        desc: "一个为爱制作的小工具"
        url: "./flag/"
        icon: "fa-solid fa-rainbow"
      - title: "\u201C\U0001F630不出来\u201D表情包生成器"
        desc: "没什么用的小玩意"
        url: "./meme/"
        icon: "fa-solid fa-box"
      - title: "Renderer"
        desc: "自用的小东西"
        url: "./renderer/"
        icon: "fa-solid fa-layer-group"

  contact:
    heading: "找到我"
    links:
      - icon: "fa-brands fa-github"
        url: "https://github.com/miniyu157"
        isCopy: false
      - icon: "fa-brands fa-qq"
        val: "1979287894"
        isCopy: true
        msg: "QQ 号码"
      - icon: "fa-solid fa-envelope"
        url: "mailto:yumeka.love9@gmail.com"
