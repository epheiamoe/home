# ---------------------------------------------------------------------------
# Chat Renderer (renderer/index.html) 配置
# ---------------------------------------------------------------------------
renderer:
  settingsSchema:
    - key: "--font-size"
      label: "全局字号大小"
      type: "number"
      def: 16
      min: 12
      max: 32
      step: 1
      unit: "px"

    - key: "--line-height"
      label: "正文行高"
      type: "number"
      def: 1.6
      min: 1.0
      max: 3.0
      step: 0.1
      unit: ""

    - key: "--code-line-height"
      label: "代码块行高"
      type: "number"
      def: 1.4
      min: 1.0
      max: 3.0
      step: 0.1
      unit: ""

    - key: "--font-family"
      label: "字体族或路径 (支持 https http)"
      type: "string"
      def: "./assets/font.woff2"
      placeholder: "./assets/font.woff2"